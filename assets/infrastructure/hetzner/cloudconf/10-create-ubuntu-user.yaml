#cloud-config
# Hetzner Ubuntu images use 'root' as the default user, but the Exasol
# installation scripts expect a 'ubuntu' user. Create it here.

users:
  - name: ubuntu
    gecos: Ubuntu User
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    groups: sudo

# Copy SSH authorized_keys from root to ubuntu so the barrier client can SSH to itself
runcmd:
  - mkdir -p /home/ubuntu/.ssh
  - cp /root/.ssh/authorized_keys /home/ubuntu/.ssh/authorized_keys
  - chown -R ubuntu:ubuntu /home/ubuntu/.ssh
  - chmod 700 /home/ubuntu/.ssh
  - chmod 600 /home/ubuntu/.ssh/authorized_keys
