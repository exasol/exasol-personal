version: '3'

vars:
  COMMAND_NAME: exasol
  BINARY_SUFFIX:
    sh: test "$(go env GOOS)" = "windows" && echo ".exe" || true
  BINARY_NAME: "{{.COMMAND_NAME}}{{.BINARY_SUFFIX}}"
  MAIN_PATH_REL: "./cmd/exasol"
  BUILD_DIR_NAME: "bin"
  ROOT_PATH: >-
    {{- if eq OS "windows" }}
      {{- .ROOT_DIR | replace "\\" "\\\\" }}
    {{- else }}
      {{- .ROOT_DIR }}
    {{- end }}
  SEP: '{{if eq OS "windows"}}\\{{else}}/{{end}}'
  BUILD_DIR: '{{.ROOT_PATH}}{{.SEP}}{{.BUILD_DIR_NAME}}'
  TESTS_DIR: '{{.ROOT_PATH}}{{.SEP}}tests'

includes:
  github: ./tasks/github.Taskfile.yml

tasks:
  default:
    silent: true
    cmds:
      - "task --list"

  local-runner-placeholders:
    desc: Create placeholder files for local runtime binaries required by go:embed
    cmds:
      - >-
        go run ./tools/localrunner placeholder
        -target assets/localruntimebin/generated/darwin/arm64/mac-runner-aarch64

  local-runner-stage:
    desc: Stage Exasol Local runner binary for go:embed when targeting macOS Apple Silicon
    vars:
      RUNNER_PATH: '{{default "" .RUNNER_PATH}}'
      TARGET_GOOS: '{{default "" .TARGET_GOOS}}'
      TARGET_GOARCH: '{{default "" .TARGET_GOARCH}}'
    cmds:
      - >-
        go run ./tools/localrunner stage
        {{if .TARGET_GOOS}}-goos {{.TARGET_GOOS}}{{end}}
        {{if .TARGET_GOARCH}}-goarch {{.TARGET_GOARCH}}{{end}}
        -runner-path "{{.RUNNER_PATH}}"
        -target assets/localruntimebin/generated/darwin/arm64/mac-runner-aarch64

  generate:
    desc: run generation for all packages
    deps:
      - local-runner-placeholders
    cmds:
      - go generate ./...
      - task: local-runner-stage

  tofu-lock-update:
    desc: Regenerate multi-platform .terraform.lock.hcl files (no temp files in assets)
    deps:
      - generate
    cmds:
      - >-
        go run ./tools/lockfileupdate/main.go
        -platform=linux_amd64
        -platform=linux_arm64
        -platform=windows_amd64
        -platform=darwin_amd64
        -platform=darwin_arm64

  # Using relative paths to build because on Windows the .ROOT_DIR
  # variable messes with path separators and results in incompatible
  # with Windows path.
  build:
    desc: Build the binary
    deps:
      - generate
    vars:
      DEBUG_BUILD: '{{default "false" .DEBUG_BUILD}}'
    env:
      CGO_ENABLED: "0"
    cmds:
      - |
        version=$(git describe --tags --abbrev=0) # First character is "v".
        go build -o {{.BUILD_DIR_NAME}}/{{.BINARY_NAME}} \
          {{if eq .DEBUG_BUILD "true"}}-gcflags="all=-N -l"{{else}}-trimpath \
          -gcflags=all=-l{{end}} \
          -ldflags "{{if ne .DEBUG_BUILD "true"}}-s -w {{end}}-X main.CurrentLauncherVersion=${version:1}" {{.MAIN_PATH_REL}}

  build-windows:
    desc: Cross-compile the Windows binary (defaults to GOARCH=amd64)
    vars:
      DEBUG_BUILD: '{{default "false" .DEBUG_BUILD}}'
      TARGET_GOARCH: '{{default "amd64" .GOARCH}}'
      OUTPUT_NAME: '{{.COMMAND_NAME}}.exe'
    env:
      GOOS: windows
      GOARCH: '{{.TARGET_GOARCH}}'
      CGO_ENABLED: "0"
    cmds:
      - |
        version=$(git describe --tags --abbrev=0) # First character is "v".
        go build -o {{.BUILD_DIR_NAME}}/{{.OUTPUT_NAME}} \
          {{if eq .DEBUG_BUILD "true"}}-gcflags="all=-N -l"{{else}}-trimpath \
          -gcflags=all=-l{{end}} \
          -ldflags "{{if ne .DEBUG_BUILD "true"}}-s -w {{end}}-X main.CurrentLauncherVersion=${version:1}" {{.MAIN_PATH_REL}}


  deps-update-golang:
    desc: Update all Go dependencies
    cmds:
      - go get -u ./...

  deps-update-python:
    desc: Update all Python dependencies
    dir: '{{.USER_WORKING_DIR}}/{{.TESTS_DIR}}'
    cmds:
      - poetry update

  deps-update:
    desc: Update all Go dependencies
    deps:
      - deps-update-golang
      - deps-update-python

  deps-install-poetry:
    cmds:
      - python3 -m pip install poetry
    status:
      - which poetry

  tests-setup:
    desc: Install required test tools
    dir: '{{.TESTS_DIR}}'
    cmds:
      - poetry sync
    status:
      - poetry run ruff --version
      - poetry run mypy --version
    deps:
      - deps-install-poetry

  tests-unit:
    desc: 'Run unit tests. TEST is a regex for `go test -run` (substring match, e.g. TEST=Ready). COVERAGE=true collects a coverage profile.'
    deps:
      - local-runner-placeholders
    vars:
      TEST: '{{default "" .TEST}}'
      COVERAGE: '{{default "false" .COVERAGE}}'
    cmds:
      - go test -v -race{{if eq .COVERAGE "true"}} -coverprofile=coverage.out -covermode=atomic{{end}}{{if .TEST}} -run "{{.TEST}}"{{end}} ./...
      - '{{if eq .COVERAGE "true"}}go tool cover -func=coverage.out{{end}}'

  tests-unit-find:
    desc: Find Go unit test names by wildcard on Linux (`task tests-unit-find TEST=*Ready*`)
    platforms:
      - linux
    vars:
      TEST: '{{default "*" .TEST}}'
    cmds:
      - |
        go test -json ./... | jq -r 'select(.Action=="run") | .Test'

  tests-integration:
    desc: Run integration tests
    deps: [tests-setup]
    dir: '{{.TESTS_DIR}}'
    cmds:
      - poetry run pytest -vv --exasol-path={{.BUILD_DIR}}{{.SEP}}{{.BINARY_NAME}} {{.TESTS_DIR}}{{.SEP}}tests{{.SEP}}integration

  tests-deployment:
    desc: Run deployment tests (`e.g. task tests-deployment INFRA=aws TEST=test_standard_deployment.py::test_license_session_limit`)
    deps: [tests-setup]
    dir: '{{.TESTS_DIR}}'
    vars:
      INFRA: '{{default "aws" .INFRA}}'
      TEST: '{{default "" .TEST}}'
      STACKIT_PROJECT_ID: '{{default "" .STACKIT_PROJECT_ID}}'
    cmds:
      - |
        poetry run pytest -vv --exasol-path={{.BUILD_DIR}}{{.SEP}}{{.BINARY_NAME}} --infra={{.INFRA}} {{if .STACKIT_PROJECT_ID}}--stackit-project-id={{.STACKIT_PROJECT_ID}}{{end}} {{.TESTS_DIR}}{{.SEP}}tests{{.SEP}}deployment{{if .TEST}}{{.SEP}}{{.TEST}}{{end}}

  tests-deployment-infrastructure:
    desc: Run infrastructure-focused deployment tests
    deps: [tests-setup]
    dir: '{{.TESTS_DIR}}'
    vars:
      INFRA: '{{default "aws" .INFRA}}'
      STACKIT_PROJECT_ID: '{{default "" .STACKIT_PROJECT_ID}}'
    cmds:
      - |
        poetry run pytest -vv --exasol-path={{.BUILD_DIR}}{{.SEP}}{{.BINARY_NAME}} --infra={{.INFRA}} {{if .STACKIT_PROJECT_ID}}--stackit-project-id={{.STACKIT_PROJECT_ID}}{{end}} -m "infrastructure_e2e" {{.TESTS_DIR}}{{.SEP}}tests{{.SEP}}deployment

  tests-deployment-installation:
    desc: Run installation-focused end-to-end tests
    deps: [tests-setup]
    dir: '{{.TESTS_DIR}}'
    vars:
      INFRA: '{{default "aws" .INFRA}}'
      STACKIT_PROJECT_ID: '{{default "" .STACKIT_PROJECT_ID}}'
    cmds:
      - |
        poetry run pytest -vv --exasol-path={{.BUILD_DIR}}{{.SEP}}{{.BINARY_NAME}} --infra={{.INFRA}} {{if .STACKIT_PROJECT_ID}}--stackit-project-id={{.STACKIT_PROJECT_ID}}{{end}} -m "installation_e2e" {{.TESTS_DIR}}{{.SEP}}tests{{.SEP}}deployment

  tests-deployment-local:
    desc: Run local VM deployment tests (macOS Apple Silicon only)
    deps: [tests-setup]
    dir: '{{.TESTS_DIR}}'
    cmds:
      - poetry run pytest -vv --exasol-path={{.BUILD_DIR}}{{.SEP}}{{.BINARY_NAME}} --infra=local -m "local_e2e" {{.TESTS_DIR}}{{.SEP}}tests{{.SEP}}deployment

  lint-ruff:
    desc: Run ruff check
    cmds:
      - task: lint-ruff-check
      - task: lint-ruff-format

  lint-ruff-fix:
    desc: Run ruff check, format and apply automatic fixes
    cmds:
      - task: lint-ruff-check-fix
      - task: lint-ruff-format-fix

  lint-ruff-check:
    desc: Run ruff check
    deps:
      - tests-setup
    dir: '{{.TESTS_DIR}}'
    cmds:
      - poetry run ruff check

  lint-ruff-check-fix:
    desc: Run ruff check and apply automatic fixes
    deps:
      - tests-setup
    dir: '{{.TESTS_DIR}}'
    cmds:
      - poetry run ruff check --fix

  lint-ruff-format:
    desc: Run ruff format
    deps:
      - tests-setup
    dir: '{{.TESTS_DIR}}'
    cmds:
      - poetry run ruff format --check

  lint-ruff-format-fix:
    desc: Run ruff format and apply automatic fixes
    deps:
      - tests-setup
    dir: '{{.TESTS_DIR}}'
    cmds:
      - poetry run ruff format

  lint-mypy:
    desc: Run mypy check
    deps: [tests-setup]
    dir: '{{.TESTS_DIR}}'
    cmds:
      - poetry run mypy {{.TESTS_DIR}}

  lint-golang:
    desc: Run golangci-lint linters
    deps:
      - local-runner-placeholders
    cmds:
      - go tool golangci-lint run ./...

  lint-golang-fix:
    desc: Run golangci-lint linters and apply automatic fixes
    deps:
      - local-runner-placeholders
    cmds:
      - go tool golangci-lint run ./... --fix

  lint-terraform:
    desc: Run tflint for Terraform files within assets/infrastructure
    cmds:
      - go tool tflint --init
      - go tool tflint --recursive --format=default --chdir=./assets/infrastructure

  lint-licenses:
    desc: Run addlicense on check mode for all source files
    cmds:
      - go tool addlicense -l mit -c "Exasol AG" -check -s=only $(git ls-files '*.go' '*.py')

  lint-licenses-fix:
    desc: Run addlicense to add the correct license header for all source files
    cmds:
      - go tool addlicense -l mit -c "Exasol AG" -s=only $(git ls-files '*.go' '*.py')

  lint:
    desc: Run linters
    cmds:
      - task: lint-golang
      - task: lint-ruff
      - task: lint-mypy
      - task: lint-terraform
      - task: lint-licenses

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -f coverage.out

  fmt-golang:
    desc: Format Go code
    cmds:
      - task: lint-golang-fix

  fmt-ruff:
    desc: Format Python code with Ruff
    deps: [tests-setup]
    dir: '{{.TESTS_DIR}}'
    cmds:
      - poetry run ruff format
      - poetry run ruff check --fix

  fmt-terraform:
    desc: Format Terraform code with OpenTofu
    cmds:
      - go run ./tools/tofu/main.go fmt -recursive assets/infrastructure

  fmt:
    desc: Format code
    deps:
      - fmt-golang
      - fmt-ruff
      - fmt-terraform

  all:
    desc: Run all tasks (lint, build, test)
    cmds:
      - task: lint
      - task: build
      - task: tests-unit
      - task: tests-integration
