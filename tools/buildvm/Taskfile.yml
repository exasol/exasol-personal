version: '3'

tasks:
  install-deps:
    desc: Install QEMU dependencies for both x86_64 and ARM64
    cmds:
      - sudo apt-get update
      - sudo apt-get install -y qemu-system-x86 qemu-system-aarch64 qemu-utils qemu-efi-aarch64 ovmf wget genisoimage parted e2fsprogs bc xz-utils virtiofsd uidmap podman jq gdisk

  generate-ssh-key:
    desc: Generate SSH key for VM access
    cmds:
      - ./scripts/generate-ssh-key.sh

  download-image:
    desc: Download Alpine Linux NoCloud image
    vars:
      IMAGE_URL: https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.3-aarch64-uefi-cloudinit-r0.qcow2
      # IMAGE_URL: https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.3-x86_64-uefi-cloudinit-r0.qcow2
    cmds:
      - ./scripts/download-image.sh {{.IMAGE_URL}}

  resize-disk:
    desc: Resize disk image to 3GB
    deps:
      - download-image
    cmds:
      - ./scripts/resize-disk.sh

  create-cloud-init:
    desc: Create cloud-init configuration ISO
    deps:
      - generate-ssh-key
    cmds:
      - ./scripts/create-cloud-init.sh

  init-vm:
    desc: Initialize and start the Alpine Linux VM (first time setup)
    deps:
      - resize-disk
      - create-cloud-init
    cmds:
      - ./scripts/init-vm.sh

  shrink-disk:
    desc: Shrink disk image to minimum size (run after init-vm)
    cmds:
      - sudo ./scripts/shrink-disk.sh

  compress-disk:
    desc: Compress disk image with xz for distribution
    cmds:
      - ./scripts/compress-disk.sh

  start-vm:
    desc: Start the Alpine Linux VM
    cmds:
      - ./scripts/start-vm.sh

  start-vm-attached:
    desc: Start the VM with console attached for debugging (Ctrl-A X to exit)
    cmds:
      - ./scripts/start-vm.sh --attached

  stop-vm:
    desc: Stop the Alpine Linux VM
    cmds:
      - ./scripts/stop-vm.sh

  connect:
    desc: Connect to the Alpine Linux VM via SSH
    cmds:
      - ssh -i vm-key -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null alpine@localhost

  startup-benchmark:
    desc: Benchmark VM startup time (start VM and measure time to SSH)
    cmds:
      - ./scripts/startup-benchmark.sh

  test-ssh-keys:
    desc: Test SSH key import feature (requires built VM image)
    cmds:
      - ./scripts/test-ssh-keys.sh

  test-container:
    desc: Test container REST server and data persistence (requires running VM with container)
    deps:
      - copy-test-container-to-shared
    cmds:
      - ./scripts/test-container.sh

  test:
    desc: Run all tests
    cmds:
      - task: test-ssh-keys
      - task: test-container

  copy-test-container-to-shared:
    deps:
      - build-test-container
    cmds:
      - cp test-podman-container/dist/test-server-container.tar.gz shared/test-server-container.tar.gz
      - cp test-podman-container/dist/container-manifest.json shared/container-manifest.json
      - echo "Container tarball and manifest copied to shared directory"

  build-test-container:
    desc: Build and package the test Podman container for distribution
    dir: test-podman-container
    cmds:
      - ./build-packaged-container.sh

  build:
    desc: Build complete VM image ready for distribution
    cmds:
      - task: init-vm
      - task: shrink-disk
      - task: test

  package-mac:
    desc: Package VM for macOS using vfkit (packages disk image for distribution)
    cmds:
      - ./scripts/package-mac.sh

  package-windows:
    desc: Package VM for Windows Hyper-V (converts disk.img to VHDX format)
    cmds:
      - ./scripts/package-windows.sh

  cleanup-force:
    desc: Force kill all QEMU and virtiofsd processes and clean up files
    cmds:
      - task: clean
      - ./scripts/cleanup-force.sh

  clean:
    desc: Remove all generated files (disk image, cloud-init ISO, SSH keys, etc.)
    cmds:
      - task: stop-vm  
      - git clean -Xf .
      - echo "==> Cleaned all ignored files in buildvm directory"
