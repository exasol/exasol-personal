name: status-set
description: Set commit status.
inputs:
  context:
    description: The context of the status (the name).
    required: true
  status:
    description: The status to set to.
    required: true
  description:
    description: The description of the status.
    required: true
  target-url:
    description: The URL link associated with the status.
    required: true
runs:
  using: "composite"
  steps:
    - uses: actions/github-script@v7
      with:
        script: |
          let state = '${{ inputs.status }}';
          if (state !== 'success' && state !== 'pending') {
            state = 'failure';
          }

          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: state,
            description: '${{ inputs.description }}',
            target_url: '${{ inputs.target-url }}',
            context: '${{ inputs.context }}',
          })
