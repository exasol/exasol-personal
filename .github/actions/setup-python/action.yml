name: setup-python
description: Setup Python and Poetry
runs:
  using: "composite"
  steps:
    - name: Setup Task
      uses: ./.github/actions/setup-task

    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.13'

    - name: Cache Poetry dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          # List all platform cache paths; only existing ones will be cached.
          ~/.cache/pypoetry
          ~/.cache/pip
          ${{ env.USERPROFILE }}\.cache\pypoetry
          ${{ env.USERPROFILE }}\.cache\pip
        key: poetry-venv-${{ runner.os }}-${{ hashFiles('tests/poetry.lock') }}
        restore-keys: |
          poetry-venv-${{ runner.os }}-

    - name: Install test dependencies (Poetry)
      shell: bash
      run: task tests-setup
