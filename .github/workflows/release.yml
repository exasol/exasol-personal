# .github/workflows/release.yml
name: Version tag pushed - Create GH release

on:
  push:
    # run only against version tags
    tags:
      - "v*"

permissions: {}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Setup Task
        uses: ./.github/actions/setup-task
      
      - name: Setup CodeSignTool for Windows signing
        uses: ./.github/actions/setup-codesigntool
        with:
          version: v1.3.2
          checksum-sha256: f14b1e1ef14bfa1fd00279c363aab0debbf5dcfba0e4bcdce5d22bb771de0e3a
      
      - name: Setup macOS signing certificate
        id: macos-signing
        uses: ./.github/actions/setup-macos-signing
        with:
          p12-key: ${{ secrets.IOS_PKCS12_IDENTITY_CERTIFICATE_BASE64_ENCODED }}
          p12-password: ${{ secrets.IOS_PKCS12_IDENTITY_CERTIFICATE_PASSWORD }}
          application-cert: ${{ secrets.IOS_CER_DEVELOPERID_APPLICATION_BASE64_ENCODED }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean       
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCAL_RUNNER_GITHUB_TOKEN: ${{ secrets.EXASOL_NANO_VM_TOKEN }}
          MACOS_SIGN_P12: ${{ steps.macos-signing.outputs.p12-path }}
          MACOS_SIGN_PASSWORD: ${{ secrets.IOS_PKCS12_IDENTITY_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID:  ${{ secrets.IOS_APPSTORECONNECTAPI_ISSUERID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.IOS_APPSTORECONNECTAPI_KEYID }}
          MACOS_NOTARY_KEY: ${{ secrets.IOS_APPSTORECONNECTAPI_AUTHKEY }}
          SSLCOM_USERNAME: ${{ secrets.ESIGN_USERNAME }}
          SSLCOM_PASSWORD: ${{ secrets.ESIGN_PASSWORD }}
          SSLCOM_CREDENTIAL_ID: ${{ secrets.ESIGN_CREDENTIAL_ID }}
          SSLCOM_TOTP_SECRET: ${{ secrets.ESIGN_TOTP_SECRET }}
      
