# Extra jobs to run on merges to main.
# Specifically, build the binaries for the other platforms we want support
name: Main branch pushed - Build Windows and MacOS

on:
  push:
    branches: [main]

permissions: {}

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # this is need because we use "git describe" to get the latest version from git       
          fetch-depth: 0
      - uses: ./.github/actions/build
      - name: Upload file (Windows)
        uses: actions/upload-artifact@v7
        with:
          name: exasol-windows-latest
          path: bin/exasol.exe

  build-macos-local:
    runs-on: macos-15
    permissions:
      contents: read
    env:
      LOCAL_RUNTIME_PAYLOAD_VERSION: ${{ vars.LOCAL_RUNTIME_PAYLOAD_VERSION }}
      LOCAL_RUNTIME_RUNFILE_URL: ${{ vars.LOCAL_RUNTIME_RUNFILE_URL }}
      LOCAL_RUNTIME_RUNFILE_SHA256: ${{ vars.LOCAL_RUNTIME_RUNFILE_SHA256 }}
      LOCAL_RUNTIME_KERNEL_URL: ${{ vars.LOCAL_RUNTIME_KERNEL_URL }}
      LOCAL_RUNTIME_KERNEL_SHA256: ${{ vars.LOCAL_RUNTIME_KERNEL_SHA256 }}
      LOCAL_RUNTIME_INITRD_URL: ${{ vars.LOCAL_RUNTIME_INITRD_URL }}
      LOCAL_RUNTIME_INITRD_SHA256: ${{ vars.LOCAL_RUNTIME_INITRD_SHA256 }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-go
      - name: Prepare embedded local runtime bundle
        shell: bash
        run: ./.github/scripts/prepare-local-runtime-bundle.sh
      - name: Build macOS local launcher
        shell: bash
        run: task build-macos-local-release
      - name: Upload file
        uses: actions/upload-artifact@v7
        with:
          name: exasol-macos-latest
          path: bin/exasol
