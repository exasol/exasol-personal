name: Push to PR or main - Run full CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [review_requested, ready_for_review, synchronize]

permissions: {}

jobs:
  classify-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs_quality_required: ${{ steps.classify.outputs.docs_quality_required }}
      full_ci_required: ${{ steps.classify.outputs.full_ci_required }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        run: .github/scripts/classify-ci-changes.sh

  docs-quality:
    runs-on: ubuntu-latest
    needs: classify-changes
    if: needs.classify-changes.outputs.docs_quality_required == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run documentation checks
        run: echo "No Markdown or spelling checks are configured yet."

  # run all go-based linters together so they can share the go setup and the cache
  lint-go:
    runs-on: ubuntu-latest
    needs: classify-changes
    if: needs.classify-changes.outputs.full_ci_required == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go
      - name: Lint Go code
        run: task lint-golang
      - name: Lint Terraform code
        run: task lint-terraform

  # run all python-based together linters so they can share the python setup and the cache
  lint-python:
    runs-on: ubuntu-latest
    needs: classify-changes
    if: needs.classify-changes.outputs.full_ci_required == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python
      - name: Lint ruff
        run: task lint-ruff
      - name: Lint mypy
        run: task lint-mypy

  build:
    runs-on: ${{ matrix.os }}
    if: needs.classify-changes.outputs.full_ci_required == 'true'
    needs:
      - classify-changes
      - lint-go
      - lint-python
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          # this is need because we use "git describe" to get the latest version from git
          fetch-depth: 0
      - uses: ./.github/actions/build
      # Upload the correct file depending on OS with a unique name
      - name: Upload file (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: actions/upload-artifact@v7
        with:
          name: exasol-${{ matrix.os }}
          path: bin/exasol.exe
      - name: Upload file (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v7
        with:
          name: exasol-${{ matrix.os }}
          path: bin/exasol

  tests-unit:
    runs-on: ubuntu-latest
    needs:
      - classify-changes
      - build
    if: needs.classify-changes.outputs.full_ci_required == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/tests-unit

  tests-integration:
    runs-on: ${{ matrix.os }}
    needs:
      - classify-changes
      - build
    if: needs.classify-changes.outputs.full_ci_required == 'true'
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Download artifact based on OS
      - name: Download built artifact
        uses: actions/download-artifact@v8
        with:
          name: exasol-${{ matrix.os }}
          path: bin/
      # Only Ubuntu needs chmod
      - name: Make executable (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: chmod +x bin/exasol
      - uses: ./.github/actions/tests-integration

  ci-required:
    runs-on: ubuntu-latest
    needs:
      - classify-changes
      - docs-quality
      - lint-go
      - lint-python
      - build
      - tests-unit
      - tests-integration
    if: always()
    steps:
      - name: Fail if required CI did not pass
        if: >-
          ${{
            needs.classify-changes.result != 'success' ||
            (
              needs.classify-changes.outputs.docs_quality_required == 'true' &&
              needs.docs-quality.result != 'success'
            ) ||
            (
              needs.classify-changes.outputs.full_ci_required == 'true' &&
              (
                needs.lint-go.result != 'success' ||
                needs.lint-python.result != 'success' ||
                needs.build.result != 'success' ||
                needs.tests-unit.result != 'success' ||
                needs.tests-integration.result != 'success'
              )
            )
          }}
        run: exit 1
      - name: Required CI passed
        run: echo "Required CI checks passed."
