name: Push to PR or main - Run full CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]    

permissions: {}

jobs:
  # run all go-based linters together so they can share the go setup and the cache
  lint-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-go
      - name: Lint Go code
        run: task lint-golang
      - name: Lint Terraform code
        run: task lint-terraform

  # run all python-based together linters so they can share the python setup and the cache
  lint-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-python
      - name: Lint ruff
        run: task lint-ruff
      - name: Lint mypy
        run: task lint-mypy

  build:
    runs-on: ${{ matrix.os }}
    needs:
      - lint-go
      - lint-python
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # this is need because we use "git describe" to get the latest version from git
          fetch-depth: 0
      - uses: ./.github/actions/build
      # Upload the correct file depending on OS with a unique name
      - name: Upload file (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: exasol-${{ matrix.os }}
          path: bin/exasol.exe
      - name: Upload file (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: exasol-${{ matrix.os }}
          path: bin/exasol

  tests-unit:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/tests-unit
      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-unit
          path: coverage.out

  tests-integration:
    runs-on: ${{ matrix.os }}
    needs: build
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Download artifact based on OS
      - name: Download built artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: exasol-${{ matrix.os }}
          path: bin/
      # Only Ubuntu needs chmod
      - name: Make executable (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: chmod +x bin/exasol
      - uses: ./.github/actions/tests-integration

  sonarqube:
    runs-on: ubuntu-latest
    needs: tests-unit
    # Fork PRs never receive repo secrets under the pull_request trigger, so SONAR_TOKEN
    # wouldn't be available anyway; skip them explicitly rather than run a scan that fails.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-unit
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
