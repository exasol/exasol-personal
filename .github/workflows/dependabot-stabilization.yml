name: Dependabot stabilization window

on:
  pull_request:
  schedule:
    - cron: "0 */6 * * *"  # Recheck every 6 hours
permissions:
  contents: read
  pull-requests: read

jobs:
  stabilization-check:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check if PR is minor update
        id: check_minor
        env:
          UPDATE_TYPE_INPUT: ${{ steps.metadata.outputs.update-type }}
        run: |
          UPDATE_TYPE="${UPDATE_TYPE_INPUT}"
          if [[ "${UPDATE_TYPE}" == "version-update:semver-minor" ]]; then
            echo "is_minor=true" >> $GITHUB_OUTPUT
          else
            echo "is_minor=false" >> $GITHUB_OUTPUT
          fi

      - name: Enforce 48h delay for minor updates
        if: steps.check_minor.outputs.is_minor == 'true'
        env:
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
        run: |
          PR_CREATED=$(date -d "${PR_CREATED_AT}" +%s)
          NOW=$(date +%s)
          AGE=$((NOW - PR_CREATED))

          REQUIRED_AGE=$((48 * 3600))

          if [[ "$AGE" -lt "$REQUIRED_AGE" ]]; then
            echo "Minor update within 48h stabilization window"
            exit 1
          else
            echo "Stabilization window passed"
          fi

      - name: No delay required
        if: steps.check_minor.outputs.is_minor == 'false'
        run: echo "No delay required"
